<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول | نيو سي برنسيس للسياحة</title>
  <script>tailwind={config:{theme:{extend:{colors:{primary:"#1B5E20",lightGreen:"#2E7D32",gold:"#B8860B",lightGold:"#DAA520",darkBg:"#0D1B0E",offWhite:"#F8F5EC",borderGold:"#D4AF6A"},fontFamily:{sans:["Cairo","sans-serif"]}}}}}}</script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase-config.js"></script>
  <script src="/js/auth.js"></script>
  <style>
    :root { --gold:#B8860B; --green:#1B5E20; --green-deep:#0D1B0E; }
    body { font-family:'Cairo',sans-serif; background:linear-gradient(155deg,#0D1B0E 0%,#132415 55%,#0A150B 100%); min-height:100vh; }

    /* geo pattern */
    .geo { position:fixed; inset:0; pointer-events:none; z-index:0;
      background-image: repeating-linear-gradient(0deg,rgba(184,134,11,.04) 0,rgba(184,134,11,.04) 1px,transparent 1px,transparent 40px),
                        repeating-linear-gradient(90deg,rgba(184,134,11,.04) 0,rgba(184,134,11,.04) 1px,transparent 1px,transparent 40px); }
    .geo::before { content:''; position:absolute; top:-20%;right:-10%;width:55%;aspect-ratio:1;border-radius:50%;background:radial-gradient(circle,rgba(184,134,11,.12),transparent 68%); }
    .geo::after  { content:''; position:absolute; bottom:-20%;left:-10%;width:50%;aspect-ratio:1;border-radius:50%;background:radial-gradient(circle,rgba(27,94,32,.25),transparent 68%); }

    /* card */
    .auth-card { background:rgba(255,255,255,.97); border-radius:20px; overflow:hidden; box-shadow:0 24px 64px rgba(0,0,0,.45); position:relative; z-index:1; width:100%; max-width:420px; margin:auto; }
    .auth-card-header { background:linear-gradient(135deg,#0D1B0E 0%,#1a3c1e 100%); padding:32px 32px 28px; text-align:center; border-bottom:2px solid rgba(184,134,11,.3); }
    .auth-card-body { padding:32px; }

    .icon-ring { width:64px; height:64px; background:linear-gradient(135deg,#B8860B,#9a7209); border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 16px; box-shadow:0 6px 20px rgba(184,134,11,.4); }

    /* inputs */
    .field-wrap { position:relative; margin-bottom:16px; }
    .field-icon { position:absolute; right:14px; top:50%; transform:translateY(-50%); color:#9ca3af; font-size:14px; pointer-events:none; }
    .field-input { width:100%; border:1.5px solid #e2dfd8; border-radius:10px; padding:12px 40px 12px 14px; font-family:'Cairo',sans-serif; font-size:14px; color:#1a1a1a; outline:none; transition:border-color .2s,box-shadow .2s; background:#fafaf8; }
    .field-input:focus { border-color:#B8860B; box-shadow:0 0 0 3px rgba(184,134,11,.1); background:#fff; }
    .field-input.error { border-color:#ef4444; }
    .field-label { font-size:12px; font-weight:700; color:#6b7280; margin-bottom:6px; display:block; }

    /* password toggle */
    .pw-toggle { position:absolute; left:12px; top:50%; transform:translateY(-50%); background:none; border:none; color:#9ca3af; cursor:pointer; font-size:14px; }

    /* divider */
    .divider { display:flex; align-items:center; gap:10px; margin:20px 0; }
    .divider::before, .divider::after { content:''; flex:1; height:1px; background:#e2dfd8; }
    .divider span { font-size:11px; color:#9ca3af; font-weight:600; }

    /* btn */
    .btn-gold { display:flex; align-items:center; justify-content:center; gap:8px; width:100%; background:linear-gradient(135deg,#B8860B,#9a7209); color:#fff; padding:13px; border-radius:10px; font-family:'Cairo',sans-serif; font-weight:800; font-size:15px; border:none; cursor:pointer; box-shadow:0 4px 16px rgba(184,134,11,.35); transition:transform .2s,box-shadow .2s; }
    .btn-gold:hover { transform:translateY(-1px); box-shadow:0 8px 22px rgba(184,134,11,.45); }
    .btn-gold:disabled { opacity:.6; transform:none; cursor:not-allowed; }
    .btn-outline { display:flex; align-items:center; justify-content:center; gap:8px; width:100%; background:transparent; color:#1B5E20; padding:12px; border-radius:10px; font-family:'Cairo',sans-serif; font-weight:700; font-size:14px; border:1.5px solid #1B5E20; cursor:pointer; transition:background .2s; }
    .btn-outline:hover { background:#f0fdf1; }

    /* alert */
    .alert { border-radius:8px; padding:10px 14px; font-size:13px; font-weight:700; margin-bottom:14px; display:none; align-items:center; gap:8px; }
    .alert-error { background:#fef2f2; border:1px solid #fecaca; color:#dc2626; }
    .alert-success { background:#f0fdf4; border:1px solid #bbf7d0; color:#16a34a; }
    .alert.show { display:flex; }

    /* spinner */
    .spin { width:20px; height:20px; border:2px solid rgba(255,255,255,.4); border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* social btn */
    .btn-google { display:flex; align-items:center; justify-content:center; gap:10px; width:100%; background:#fff; color:#374151; padding:11px; border-radius:10px; font-family:'Cairo',sans-serif; font-weight:700; font-size:14px; border:1.5px solid #e2dfd8; cursor:pointer; transition:background .2s,border-color .2s; }
    .btn-google:hover { background:#f9fafb; border-color:#ccc; }
    .btn-google svg { width:18px; height:18px; }

    /* tab */
    .tabs { display:grid; grid-template-columns:1fr 1fr; background:#f3f0ea; border-radius:10px; padding:3px; margin-bottom:24px; }
    .tab { padding:9px; border-radius:8px; font-family:'Cairo',sans-serif; font-weight:700; font-size:13px; color:#6b7280; background:transparent; border:none; cursor:pointer; transition:all .2s; }
    .tab.active { background:#fff; color:#1B5E20; box-shadow:0 1px 6px rgba(0,0,0,.1); }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
  <div class="geo"></div>

  <div class="auth-card">
    <!-- Header -->
    <div class="auth-card-header">
      <a href="/index.html">
        <img src="/assets/logo-white.png" alt="نيو سي برنسيس" style="height:40px;margin:0 auto 14px;display:block;"
             onerror="this.style.display='none';document.getElementById('logoFallback').style.display='flex'">
        <div id="logoFallback" style="display:none;align-items:center;justify-content:center;gap:8px;margin-bottom:14px;">
          <i class="fa-solid fa-kaaba" style="color:#DAA520;font-size:22px;"></i>
          <span style="color:#fff;font-size:18px;font-weight:900;">نيو سي برنسيس</span>
        </div>
      </a>
      <h1 style="color:#fff;font-size:20px;font-weight:800;margin-bottom:4px;">مرحباً بك</h1>
      <p style="color:rgba(255,255,255,.55);font-size:13px;">سجّل دخولك لمتابعة حجزك وإدارة بياناتك</p>
    </div>

    <!-- Body -->
    <div class="auth-card-body">

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab active" id="tabLogin" onclick="switchTab('login')">تسجيل الدخول</button>
        <button class="tab" id="tabRegister" onclick="switchTab('register')">حساب جديد</button>
      </div>

      <!-- Alert -->
      <div class="alert alert-error" id="alertError"><i class="fa-solid fa-circle-exclamation"></i><span id="alertErrorText"></span></div>
      <div class="alert alert-success" id="alertSuccess"><i class="fa-solid fa-circle-check"></i><span id="alertSuccessText"></span></div>

      <!-- ══ LOGIN FORM ══ -->
      <div id="loginForm">
        <div class="field-wrap">
          <label class="field-label">البريد الإلكتروني</label>
          <i class="fa-solid fa-envelope field-icon"></i>
          <input type="email" id="loginEmail" class="field-input" placeholder="example@email.com" style="direction:ltr;text-align:right;" autocomplete="email">
        </div>
        <div class="field-wrap">
          <label class="field-label">كلمة المرور</label>
          <i class="fa-solid fa-lock field-icon"></i>
          <input type="password" id="loginPass" class="field-input" placeholder="••••••••" style="direction:ltr;" autocomplete="current-password">
          <button type="button" class="pw-toggle" onclick="togglePw('loginPass',this)"><i class="fa-solid fa-eye"></i></button>
        </div>

        <div style="text-align:left;margin-bottom:18px;">
          <a href="#" onclick="showForgot();return false;" style="font-size:12px;color:#B8860B;font-weight:700;text-decoration:none;">نسيت كلمة المرور؟</a>
        </div>

        <button class="btn-gold" id="loginBtn" onclick="handleLogin()">
          <i class="fa-solid fa-right-to-bracket"></i> تسجيل الدخول
        </button>

        <div class="divider"><span>أو</span></div>

        <button class="btn-google" onclick="handleGoogleLogin()">
          <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          الدخول بحساب Google
        </button>
      </div>

      <!-- ══ REGISTER FORM ══ -->
      <div id="registerForm" style="display:none;">
        <div class="field-wrap">
          <label class="field-label">الاسم الكامل</label>
          <i class="fa-solid fa-user field-icon"></i>
          <input type="text" id="regName" class="field-input" placeholder="محمد أحمد علي">
        </div>
        <div class="field-wrap">
          <label class="field-label">رقم الهاتف (واتساب)</label>
          <i class="fa-brands fa-whatsapp field-icon" style="color:#25D366;"></i>
          <input type="tel" id="regPhone" class="field-input" placeholder="01xxxxxxxxx" inputmode="numeric" oninput="this.value=this.value.replace(/[^0-9+]/g,'')">
        </div>
        <div class="field-wrap">
          <label class="field-label">البريد الإلكتروني</label>
          <i class="fa-solid fa-envelope field-icon"></i>
          <input type="email" id="regEmail" class="field-input" placeholder="example@email.com" style="direction:ltr;text-align:right;">
        </div>
        <div class="field-wrap">
          <label class="field-label">كلمة المرور</label>
          <i class="fa-solid fa-lock field-icon"></i>
          <input type="password" id="regPass" class="field-input" placeholder="8 أحرف على الأقل" style="direction:ltr;" autocomplete="new-password">
          <button type="button" class="pw-toggle" onclick="togglePw('regPass',this)"><i class="fa-solid fa-eye"></i></button>
        </div>
        <!-- strength bar -->
        <div style="margin-bottom:14px;">
          <div style="height:4px;background:#e5e7eb;border-radius:2px;overflow:hidden;">
            <div id="strengthBar" style="height:100%;width:0;border-radius:2px;transition:width .3s,background .3s;"></div>
          </div>
          <p id="strengthLabel" style="font-size:11px;color:#9ca3af;margin-top:4px;"></p>
        </div>

        <button class="btn-gold" id="registerBtn" onclick="handleRegister()">
          <i class="fa-solid fa-user-plus"></i> إنشاء الحساب
        </button>

        <div class="divider"><span>أو</span></div>
        <button class="btn-google" onclick="handleGoogleLogin()">
          <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          التسجيل بحساب Google
        </button>
        <p style="font-size:11px;color:#9ca3af;text-align:center;margin-top:14px;line-height:1.6;">
          بالتسجيل توافق على <a href="/terms.html" style="color:#B8860B;font-weight:700;">شروط الاستخدام</a> و<a href="/privacy.html" style="color:#B8860B;font-weight:700;">سياسة الخصوصية</a>
        </p>
      </div>

      <!-- ══ FORGOT PASSWORD ══ -->
      <div id="forgotForm" style="display:none;">
        <button onclick="switchTab('login')" style="background:none;border:none;color:#B8860B;font-size:13px;font-weight:700;font-family:'Cairo',sans-serif;cursor:pointer;margin-bottom:16px;display:flex;align-items:center;gap:5px;padding:0;">
          <i class="fa-solid fa-arrow-right"></i> العودة لتسجيل الدخول
        </button>
        <h2 style="font-size:16px;font-weight:800;color:#1B5E20;margin-bottom:6px;">إعادة تعيين كلمة المرور</h2>
        <p style="font-size:13px;color:#6b7280;margin-bottom:18px;">أدخل بريدك الإلكتروني وسنرسل لك رابط إعادة التعيين.</p>
        <div class="field-wrap">
          <i class="fa-solid fa-envelope field-icon"></i>
          <input type="email" id="forgotEmail" class="field-input" placeholder="example@email.com" style="direction:ltr;text-align:right;">
        </div>
        <button class="btn-gold" id="forgotBtn" onclick="handleForgot()">
          <i class="fa-solid fa-paper-plane"></i> إرسال رابط الاسترداد
        </button>
      </div>

      <!-- Footer link -->
      <p style="text-align:center;margin-top:22px;font-size:12px;color:#9ca3af;">
        <a href="/index.html" style="color:#B8860B;font-weight:700;text-decoration:none;">
          <i class="fa-solid fa-arrow-right"></i> العودة للموقع
        </a>
      </p>

    </div>
  </div>

<script>
/* ── tab switch ── */
function switchTab(tab) {
  ['login','register'].forEach(t => {
    document.getElementById(t+'Form').style.display   = t===tab ? '' : 'none';
    document.getElementById('tab'+t.charAt(0).toUpperCase()+t.slice(1)).classList.toggle('active', t===tab);
  });
  document.getElementById('forgotForm').style.display = 'none';
  hideAlerts();
}
function showForgot() {
  ['loginForm','registerForm'].forEach(id => document.getElementById(id).style.display='none');
  document.getElementById('forgotForm').style.display = '';
  hideAlerts();
}

/* ── alerts ── */
function showError(msg)   { const a=document.getElementById('alertError');   document.getElementById('alertErrorText').textContent=msg;   hideAlerts(); a.classList.add('show'); }
function showSuccess(msg) { const a=document.getElementById('alertSuccess'); document.getElementById('alertSuccessText').textContent=msg; hideAlerts(); a.classList.add('show'); }
function hideAlerts()     { ['alertError','alertSuccess'].forEach(id => document.getElementById(id).classList.remove('show')); }

/* ── password toggle ── */
function togglePw(id, btn) {
  const inp = document.getElementById(id);
  const show = inp.type === 'password';
  inp.type = show ? 'text' : 'password';
  btn.innerHTML = `<i class="fa-solid ${show ? 'fa-eye-slash' : 'fa-eye'}"></i>`;
}

/* ── password strength ── */
document.getElementById('regPass')?.addEventListener('input', function() {
  const v = this.value;
  let score = 0;
  if (v.length >= 8)  score++;
  if (/[A-Z]/.test(v)) score++;
  if (/[0-9]/.test(v)) score++;
  if (/[^A-Za-z0-9]/.test(v)) score++;
  const bar = document.getElementById('strengthBar');
  const lbl = document.getElementById('strengthLabel');
  const map = [[0,'0%','#e5e7eb',''],[1,'25%','#ef4444','ضعيفة'],[2,'50%','#f59e0b','مقبولة'],[3,'75%','#3b82f6','جيدة'],[4,'100%','#16a34a','قوية جداً']];
  const [,w,c,t] = map[Math.min(score,4)];
  bar.style.width = w; bar.style.background = c; lbl.textContent = t ? 'قوة كلمة المرور: '+t : '';
});

/* ── loading state ── */
function setLoading(btnId, loading) {
  const btn = document.getElementById(btnId);
  btn.disabled = loading;
  if (loading) btn.innerHTML = '<div class="spin"></div>';
}

/* ── login ── */
async function handleLogin() {
  hideAlerts();
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPass').value;
  if (!email || !pass) { showError('يرجى إدخال البريد الإلكتروني وكلمة المرور'); return; }
  setLoading('loginBtn', true);
  try {
    await NSPAuth.signIn({ email, password: pass });
    showSuccess('تم تسجيل الدخول بنجاح، جاري التحويل...');
    const next = new URLSearchParams(location.search).get('next') || '/my-account.html';
    setTimeout(() => window.location.href = next, 900);
  } catch(e) {
    const msgs = { 'Invalid login credentials':'بيانات الدخول غير صحيحة', 'Email not confirmed':'يرجى تفعيل بريدك الإلكتروني أولاً', 'تم إيقاف هذا الحساب من الإدارة، يرجى التواصل مع الدعم':'تم إيقاف هذا الحساب من الإدارة، يرجى التواصل مع الدعم' };
    showError(msgs[e.message] || 'حدث خطأ، يرجى المحاولة مرة أخرى');
    setLoading('loginBtn', false);
    document.getElementById('loginBtn').innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> تسجيل الدخول';
  }
}

/* ── register ── */
async function handleRegister() {
  hideAlerts();
  const name  = document.getElementById('regName').value.trim();
  const phone = document.getElementById('regPhone').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const pass  = document.getElementById('regPass').value;
  if (!name || !email || !pass) { showError('يرجى ملء جميع الحقول المطلوبة'); return; }
  if (pass.length < 8) { showError('كلمة المرور يجب أن تكون 8 أحرف على الأقل'); return; }
  setLoading('registerBtn', true);
  try {
    await NSPAuth.signUp({ email, password: pass, fullName: name, phone });
    showSuccess('تم إنشاء حسابك! راجع بريدك الإلكتروني لتفعيل الحساب.');
    document.getElementById('registerBtn').innerHTML = '<i class="fa-solid fa-user-plus"></i> إنشاء الحساب';
    document.getElementById('registerBtn').disabled = false;
  } catch(e) {
    const msgs = { 'User already registered':'البريد الإلكتروني مسجّل بالفعل' };
    showError(msgs[e.message] || e.message || 'حدث خطأ أثناء التسجيل');
    setLoading('registerBtn', false);
    document.getElementById('registerBtn').innerHTML = '<i class="fa-solid fa-user-plus"></i> إنشاء الحساب';
  }
}

/* ── forgot ── */
async function handleForgot() {
  hideAlerts();
  const email = document.getElementById('forgotEmail').value.trim();
  if (!email) { showError('يرجى إدخال بريدك الإلكتروني'); return; }
  setLoading('forgotBtn', true);
  try {
    await NSPAuth.sendPasswordReset(email);
    showSuccess('تم الإرسال! تحقق من بريدك الإلكتروني.');
  } catch(e) {
    showError('حدث خطأ، تأكد من البريد الإلكتروني وحاول مرة أخرى');
  }
  document.getElementById('forgotBtn').disabled = false;
  document.getElementById('forgotBtn').innerHTML = '<i class="fa-solid fa-paper-plane"></i> إرسال رابط الاسترداد';
}

/* ── google ── */
async function handleGoogleLogin() {
  try {
    const { error } = await window.db.auth.signInWithOAuth({ provider:'google', options:{ redirectTo: window.location.origin+'/my-account.html' } });
    if (error) throw error;
  } catch(e) { showError('تعذّر الاتصال بـ Google، حاول لاحقاً'); }
}

/* ── enter key ── */
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  if (document.getElementById('loginForm').style.display !== 'none') handleLogin();
  else if (document.getElementById('registerForm').style.display !== 'none') handleRegister();
  else if (document.getElementById('forgotForm').style.display !== 'none') handleForgot();
});

/* ── redirect if already logged in ── */
document.addEventListener('DOMContentLoaded', () => {
  NSPAuth.redirectIfAuth('/my-account.html');
  // Auto-open register tab if ?tab=register in URL
  const tab = new URLSearchParams(location.search).get('tab');
  if (tab === 'register') switchTab('register');
});
</script>
</body>
</html>
