function renderStats(bookings) {
  const confirmed  = bookings.filter(b => b.status === 'confirmed').length;
  const pending    = bookings.filter(b => b.status === 'pending' || b.status === 'awaiting_payment').length;
  const total      = bookings.length;
  const totalPaid  = bookings.reduce((s,b) => s + Number(b.paid_amount||0), 0);
  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-box"><div class="stat-num">${total}</div><div class="stat-lbl">إجمالي الحجوزات</div></div>
    <div class="stat-box"><div class="stat-num" style="color:#16a34a;">${confirmed}</div><div class="stat-lbl">حجوزات مؤكدة</div></div>
    <div class="stat-box"><div class="stat-num" style="color:#d97706;">${pending}</div><div class="stat-lbl">قيد المراجعة</div></div>
    <div class="stat-box"><div class="stat-num" style="color:#B8860B;font-size:20px;">${totalPaid.toLocaleString('ar-EG')}</div><div class="stat-lbl">إجمالي المدفوع (ج.م)</div></div>`;}

const STATUS_LABEL = {
  awaiting_payment: 'في انتظار الدفع',
  pending:          'قيد المراجعة',
  confirmed:        'مؤكد',
  visa_processing:  'جاري التأشيرة',
  tickets_issued:   'تذاكر صادرة',
  travelling:       'في السفر',
  completed:        'مكتمل',
  cancelled:        'ملغي'
};

function statusLabel(s) {
  return STATUS_LABEL[s] || s || 'قيد المراجعة';
}

function statusClass(s) {
  if (s === 'confirmed')        return 'status-confirmed';
  if (s === 'cancelled')        return 'status-cancelled';
  if (s === 'completed')        return 'status-confirmed';
  if (s === 'travelling')       return 'status-confirmed';
  if (s === 'tickets_issued')   return 'status-confirmed';
  if (s === 'visa_processing')  return 'status-pending';
  return 'status-pending';
}
function fmtDate(d) {
  if (!d) return '—';
  try { return new Date(d).toLocaleDateString('ar-EG',{year:'numeric',month:'long',day:'numeric'}); } catch { return d; }
}

function renderBookingList(elId, bookings) {
  const el = document.getElementById(elId);
  if (!bookings.length) {
    el.innerHTML = `<div class="empty-box"><div class="icon"><i class="fa-solid fa-suitcase-rolling"></i></div><h3>لا توجد حجوزات بعد</h3><p>ابدأ رحلتك المقدسة الآن</p><a href="/packages.html" style="display:inline-block;margin-top:14px;background:linear-gradient(135deg,#B8860B,#9a7209);color:#fff;padding:10px 22px;border-radius:9px;font-weight:800;text-decoration:none;font-size:13px;">استعرض البرامج</a></div>`;
    return;
  }
  el.innerHTML = bookings.map(b => `
    <div class="booking-item">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;">
        <div>
          <div style="font-size:15px;font-weight:800;color:#111;margin-bottom:4px;">${b.package_title || 'برنامج عمرة'}</div>
          <div style="font-size:12px;color:#6b7280;display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
            <span><i class="fa-solid fa-hashtag" style="color:#B8860B;"></i> ${b.booking_number || '—'}</span>
            <span><i class="fa-solid fa-plane-departure" style="color:#1B5E20;"></i> ${fmtDate(b.package_departure)}</span>
            <span><i class="fa-solid fa-users" style="color:#6b7280;"></i> ${b.traveler_count || 1} مسافر</span>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
          <span class="booking-status ${statusClass(b.status)}">${statusLabel(b.status)}</span>
          <a href="/tracking.html?booking=${b.booking_number}" style="font-size:11px;color:#B8860B;font-weight:700;text-decoration:none;">تفاصيل الحجز ←</a>
        </div>
      </div>
    </div>`).join('');
}

/* ── save profile ── */
async function saveProfile() {
  const name     = document.getElementById('pName').value.trim();
  const phone    = document.getElementById('pPhone').value.trim();
  const city     = document.getElementById('pCity').value.trim();
  const passport = document.getElementById('pPassport').value.trim();
  document.getElementById('profileSuccess').classList.remove('show');
  document.getElementById('profileError').classList.remove('show');
  try {
    const { error } = await window.db.auth.updateUser({ data:{ full_name:name, phone, city, passport } });
    if (error) throw error;
    document.getElementById('profileSuccess').classList.add('show');
    document.getElementById('sidebarName').textContent = name;
    document.getElementById('avatarEl').innerHTML = `<span style="font-size:26px;font-weight:900;">${name.charAt(0)}</span>`;
    setTimeout(() => document.getElementById('profileSuccess').classList.remove('show'), 3500);
  } catch(e) {
    document.getElementById('profileErrorText').textContent = e.message || 'حدث خطأ أثناء الحفظ';
    document.getElementById('profileError').classList.add('show');
  }
}

/* ── change password ── */
async function changePassword() {
  const np = document.getElementById('newPass').value;
  const cp = document.getElementById('confirmPass').value;
  document.getElementById('pwSuccess').classList.remove('show');
  document.getElementById('pwError').classList.remove('show');
  if (np.length < 8) { document.getElementById('pwErrorText').textContent='كلمة المرور يجب أن تكون 8 أحرف على الأقل'; document.getElementById('pwError').classList.add('show'); return; }
  if (np !== cp) { document.getElementById('pwErrorText').textContent='كلمتا المرور غير متطابقتين'; document.getElementById('pwError').classList.add('show'); return; }
  try {
    const { error } = await window.db.auth.updateUser({ password: np });
    if (error) throw error;
    document.getElementById('pwSuccess').classList.add('show');
    document.getElementById('newPass').value = '';
    document.getElementById('confirmPass').value = '';
    setTimeout(() => document.getElementById('pwSuccess').classList.remove('show'), 3500);
  } catch(e) {
    document.getElementById('pwErrorText').textContent = e.message || 'حدث خطأ أثناء التحديث';
    document.getElementById('pwError').classList.add('show');
  }
}

function filterPayments(filter) {
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.toggle('active', t.dataset.filter === filter));
  const list = document.getElementById('paymentsList');

  const filtered = _allPaymentBookings.filter(b => {
    const total  = Number(b.total_price || 0);
    const paid   = Number(b.paid_amount || 0);
    const remain = b.remaining_amount !== null && b.remaining_amount !== undefined
      ? Number(b.remaining_amount) : (total - paid);
    if (filter === 'paid')    return remain <= 0 && total > 0;
    if (filter === 'partial') return paid > 0 && remain > 0;
    if (filter === 'none')    return paid <= 0;
    return true;
  });

  if (!filtered.length) {
    list.innerHTML = `<div class="empty-box"><div class="icon"><i class="fa-solid fa-receipt"></i></div><h3>لا توجد نتائج</h3><p>لا توجد حجوزات تطابق هذا التصفية</p></div>`;
    return;
  }

  list.innerHTML = filtered.map(b => {
    const total  = Number(b.total_price || 0);
    const paid   = Number(b.paid_amount || 0);
    const remain = b.remaining_amount !== null && b.remaining_amount !== undefined
      ? Number(b.remaining_amount) : (total - paid);
    const pct    = total > 0 ? Math.min(100, Math.round((paid / total) * 100)) : 0;

    let payType, iconClass, badgeClass, barColor;
    if (remain <= 0 && total > 0) {
      payType = 'مدفوع بالكامل'; iconClass = 'paid'; badgeClass = 'paid'; barColor = '#16a34a';
    } else if (paid > 0) {
      payType = 'مدفوع جزئياً';  iconClass = 'partial'; badgeClass = 'partial'; barColor = '#d97706';
    } else {
      payType = 'لم يُدفع';       iconClass = 'pending'; badgeClass = 'none'; barColor = '#dc2626';
    }

    return `
      <div class="pay-item">
        <div class="pay-icon ${iconClass}">
          <i class="fa-solid ${iconClass === 'paid' ? 'fa-circle-check' : iconClass === 'partial' ? 'fa-hourglass-half' : 'fa-circle-xmark'}"></i>
        </div>
        <div style="flex:1;min-width:0;">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:6px;margin-bottom:6px;">
            <div>
              <p style="font-size:14px;font-weight:800;color:#111;margin-bottom:2px;">${b.package_title || 'برنامج عمرة'}</p>
              <p style="font-size:11px;color:#9ca3af;">
                <span class="font-mono">${b.booking_number || '—'}</span>
                &nbsp;·&nbsp;
                ${fmtDate(b.booking_date)}
              </p>
            </div>
            <span class="pay-badge ${badgeClass}">${payType}</span>
          </div>
          <!-- Amounts row -->
          <div style="display:flex;gap:16px;flex-wrap:wrap;font-size:12px;margin-bottom:6px;">
            <span style="color:#6b7280;">الإجمالي: <strong style="color:#111;">${total.toLocaleString('ar-EG')} ج.م</strong></span>
            <span style="color:#6b7280;">المدفوع: <strong style="color:#16a34a;">${paid.toLocaleString('ar-EG')} ج.م</strong></span>
            <span style="color:#6b7280;">المتبقي: <strong style="color:${remain > 0 ? '#dc2626' : '#16a34a'};">${remain.toLocaleString('ar-EG')} ج.م</strong></span>
          </div>
          <!-- Progress bar -->
          <div class="pay-progress">
            <div class="pay-progress-bar" style="width:${pct}%;background:${barColor};"></div>
          </div>
          <div style="display:flex;justify-content:space-between;margin-top:4px;">
            <span style="font-size:10px;color:#9ca3af;">${pct}% مدفوع</span>
            <a href="/tracking.html?booking=${b.booking_number}" style="font-size:10px;color:#B8860B;font-weight:700;text-decoration:none;">عرض الحجز ←</a>
          </div>
        </div>
      </div>`;
  }).join('');
}

document.addEventListener('DOMContentLoaded', loadUser);
</script>
</body>
</html>
