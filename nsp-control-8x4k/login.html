      <input type="password" id="passInput" placeholder="كلمة المرور" class="w-full border-2 border-gray-200 p-3 rounded focus:outline-none focus:border-gold text-left dir-ltr">

    <button id="loginBtn" onclick="handleLogin()" class="w-full btn-gold py-3 text-lg relative font-bold mb-4">

  </div>

  <script src="/js/admin.js"></script>
  <script>
    async function handleLogin() {
      const email = document.getElementById('emailInput').value;
      const pass = document.getElementById('passInput').value;
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('errorMsg');

      err.classList.add('hidden');
      if(!email || !pass) return;

      btn.disabled = true;
      btn.innerHTML = '<div class="loader mx-auto" style="width:24px;height:24px;border-width:3px;border-top-color:white;"></div>';

      try {
        const { data, error } = await window.db.auth.signInWithPassword({
          email: email,
          password: pass
        });

        if (error) throw error;
        // Success
        window.location.href = '/nsp-control-8x4k/dashboard.html';
      } catch(e) {
        console.error(e);
        err.innerText = "بيانات الدخول غير صحيحة.";
        err.classList.remove('hidden');
        btn.disabled = false;
        btn.innerHTML = 'تسجيل الدخول';
      }
    }

    // Auto-redirect if already logged in
    window.db.auth.getSession().then(({data}) => {
       if(data.session) window.location.href = '/nsp-control-8x4k/dashboard.html';
    });
  </script>
<script>

             nav.classList.toggle('flex');

             nav.classList.toggle('absolute');
             nav.classList.toggle('top-full');
             nav.classList.toggle('left-0');
             nav.classList.toggle('w-full');
             nav.classList.toggle('bg-white');
